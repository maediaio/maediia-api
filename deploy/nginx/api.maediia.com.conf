# Nginx configuration for api.maediia.com
#
# Deploy to: /etc/nginx/sites-available/api.maediia.com
# Enable:    ln -s /etc/nginx/sites-available/api.maediia.com /etc/nginx/sites-enabled/
# SSL:       certbot --nginx -d api.maediia.com
# Reload:    nginx -t && systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.maediia.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — FastAPI via uvicorn on 127.0.0.1:8000
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.maediia.com;

    # SSL — managed by Certbot (filled in by: certbot --nginx -d api.maediia.com)
    ssl_certificate     /etc/letsencrypt/live/api.maediia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.maediia.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # Logging
    access_log /var/log/nginx/api.maediia.com.access.log;
    error_log  /var/log/nginx/api.maediia.com.error.log;

    # Upload size limit (for knowledge base document uploads)
    client_max_body_size 50M;

    # Timeouts — voice webhooks can take a moment
    proxy_read_timeout    60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSocket support (LiveKit webhooks)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real client IP
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check — no logging to keep access logs clean
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        access_log off;
    }
}
